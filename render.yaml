# Render Deployment Configuration
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: raggita-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: BYTEZ_MODEL
        value: "openai/gpt-5.1"
      - key: BYTEZ_API_KEY
        sync: false  # Set this manually in Render dashboard
      # HUGGINGFACE_HUB_TOKEN is optional - only needed if you hit rate limits
      # Get free token at https://huggingface.co/settings/tokens if needed
    healthCheckPath: /health
    autoDeploy: true
    plan: free  # Change to 'starter' or 'standard' for production
