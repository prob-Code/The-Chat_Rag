# Render Deployment Configuration
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: raggita-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      # Groq LLM Configuration
      - key: OPENAI_API_KEY
        sync: false  # Set this manually in Render dashboard (your Groq API key)
      - key: GROQ_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: OPENAI_API_BASE
        value: "https://api.groq.com/openai/v1"
      - key: LLM_MODEL
        value: "llama-3.1-8b-instant"
      # Use remote embeddings to fit within Render's 512MB RAM limit
      - key: USE_REMOTE_EMBEDDINGS
        value: "true"
      # (Optional) Hugging Face token for higher rate limits on Inference API
      - key: HF_TOKEN
        sync: false
      # Disable Bytez (using Groq instead)
      - key: USE_BYTEZ
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
    plan: free  # Change to 'starter' or 'standard' for production
