# Render Deployment Configuration
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: raggita-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: BYTEZ_MODEL
        value: "openai/gpt-5.1"
      - key: BYTEZ_API_KEY
        sync: false  # Set this manually in Render dashboard
      - key: HUGGINGFACE_HUB_TOKEN
        sync: false  # Optional: for Hugging Face model access
    healthCheckPath: /health
    autoDeploy: true
    plan: free  # Change to 'starter' or 'standard' for production
